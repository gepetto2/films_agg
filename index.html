<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Repertuar Multikino</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f7f9fc; color: #333; max-width: 800px; margin: 0 auto; padding: 20px; }
        h1 { text-align: center; color: #2c3e50; border-bottom: 2px solid #e74c3c; padding-bottom: 10px; }
        .film { background: #fff; padding: 20px; margin-bottom: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .film h2 { margin-top: 0; font-size: 1.5em; color: #e74c3c; margin-bottom: 10px; }
        .showing { display: inline-block; background: #ecf0f1; border: 1px solid #bdc3c7; border-radius: 4px; padding: 8px 12px; margin: 5px 5px 0 0; font-size: 0.9em; line-height: 1.4; }
        .screen { font-weight: bold; color: #2980b9; }
        .version { color: #7f8c8d; font-size: 0.85em; }
    </style>
</head>
<body>
    <h1>Dzisiejszy Repertuar</h1>
    <div id="repertuar">Ładowanie danych...</div>

    <script>
        async function pobierzRepertuar() {
            try {
                // Wysyłamy zapytanie do naszego własnego API w FastAPI
                const odpowiedz = await fetch('/api/films');
                const filmy = await odpowiedz.json();
                
                const kontener = document.getElementById('repertuar');
                kontener.innerHTML = '';
                
                if (filmy.length === 0) {
                    kontener.innerHTML = '<p>Brak seansów na liście.</p>';
                    return;
                }

                // Budujemy kod HTML dla każdego z filmów
                filmy.forEach(film => {
                    const kartaFilmu = document.createElement('div');
                    kartaFilmu.className = 'film';
                    
                    const tytul = document.createElement('h2');
                    tytul.textContent = film.title;
                    kartaFilmu.appendChild(tytul);
                    
                    film.showings.forEach(seans => {
                        const badge = document.createElement('span');
                        badge.className = 'showing';
                        badge.innerHTML = `${seans.date}, <strong>${seans.time}</strong> <br> <span class="screen">${seans.screen}</span> | <span class="version">${seans.version}</span>`;
                        kartaFilmu.appendChild(badge);
                    });
                    
                    kontener.appendChild(kartaFilmu);
                });
            } catch (blad) {
                document.getElementById('repertuar').innerHTML = '<p>Wystąpił błąd podczas ładowania danych z serwera.</p>';
                console.error('Błąd:', blad);
            }
        }

        pobierzRepertuar();
    </script>
</body>
</html>
