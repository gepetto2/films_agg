name: Multikino Scraper

on:
  schedule:
    # Uruchamia skrypt co 6 godzin (0:00, 6:00, 12:00, 18:00)
    - cron: '0 */6 * * *'
  workflow_dispatch: # Pozwala Ci uruchomić skrypt ręcznie guzikiem w zakładce Actions

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install curl_cffi supabase

      - name: Run scraper
        env:
          # GitHub weźmie te wartości z Twoich "Secrets"
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python backend/main.py